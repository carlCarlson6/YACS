services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yacs
      POSTGRES_USER: yacs
      POSTGRES_PASSWORD: yacs
    volumes:
      - yacs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yacs -d yacs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yacs_postgres_data:
